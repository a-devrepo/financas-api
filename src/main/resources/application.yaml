server:
  port: 8083

spring:
  application:
    name: financasapi

  datasource:
    url: jdbc:postgresql://localhost:5435/bd-api-financas
    username: devuser
    password: devuser@2026
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true